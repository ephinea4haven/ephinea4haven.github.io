<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="description" content="PSOBB 黑页危险交易掉落表">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>黑页危险交易掉落表 — PSOBB Wiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #1a2332;
            color: #e2e8f0;
            position: relative;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('/assets/img/bg/lobby_overlook_contrast.png') center center;
            background-size: cover;
            opacity: 0.25;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(0, 212, 255, 0.08), transparent 60%),
                        radial-gradient(circle at bottom left, rgba(138, 43, 226, 0.08), transparent 60%);
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        .wrap { max-width: 1400px; margin: 0 auto; }

        header {
            position: relative;
            text-align: center;
            margin-bottom: 30px;
        }

        #pageTitle {
            color: #00d4ff;
            font-size: 2.5em;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }

        #pageSubtitle {
            color: #9fb4c8;
            font-size: 1em;
            font-weight: 500;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        #langSwitch {
            position: absolute;
            top: 50%;
            right: 8px;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
        }

        #langSwitch .lang-btn {
            background: transparent;
            color: #6a85a0;
            border: none;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.25s ease, text-shadow 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.8px;
            position: relative;
        }

        #langSwitch .lang-btn + .lang-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 30%;
            bottom: 30%;
            width: 1px;
            background: rgba(159, 180, 200, 0.25);
        }

        #langSwitch .lang-btn:hover { color: #9fd4ff; }

        #langSwitch .lang-btn.active {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
        }

        .top-actions {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(138, 43, 226, 0.15));
            color: #00d4ff;
            text-decoration: none;
            border: 1px solid rgba(0, 212, 255, 0.35);
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .back-link:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.25), rgba(138, 43, 226, 0.25));
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.35);
        }

        #bdpContainer { margin-top: 20px; }

        .bdp-table {
            width: 80%;
            margin: 30px auto;
            background: rgba(26, 35, 50, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(0, 212, 255, 0.25);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            border-collapse: separate;
            border-spacing: 0;
            text-align: center;
        }

        .bdp-table td {
            padding: 15px;
            border: 1px solid rgba(0, 212, 255, 0.15);
            line-height: 1.8;
            vertical-align: top;
        }

        .bdp-table tr.bdp-head td {
            background: linear-gradient(135deg, rgba(196, 84, 84, 0.85), rgba(180, 70, 70, 0.85));
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            vertical-align: middle;
        }

        .bdp-table td.monster-label {
            background: rgba(247, 247, 21, 0.2);
            color: #f1d676;
            font-weight: 700;
            vertical-align: middle;
        }

        /* Distinct tint per monster row so sections are easy to scan */
        .bdp-row-0 td.monster-label { background: rgba(247, 247, 21, 0.22); color: #f1d676; }
        .bdp-row-1 td.monster-label { background: rgba(204, 0, 255, 0.28); color: #f0c8ff; }
        .bdp-row-2 td.monster-label { background: rgba(89, 249, 249, 0.25); color: #b4f7f7; }
        .bdp-row-3 td.monster-label { background: rgba(0, 0, 0, 0.75); color: #ffffff; }

        .bdp-table tr:hover td { background: rgba(0, 212, 255, 0.08); }
        .bdp-table tr.bdp-head:hover td { background: linear-gradient(135deg, rgba(196, 84, 84, 0.85), rgba(180, 70, 70, 0.85)); }

        .back-to-top {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff, #00a0ff);
            color: #0a0e27;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 24px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
            transition: all 0.3s ease;
            border: 2px solid rgba(0, 212, 255, 0.3);
            z-index: 100;
        }

        .back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.6);
            background: linear-gradient(135deg, #00e4ff, #00b0ff);
        }

        @media (max-width: 768px) {
            #pageTitle { font-size: 1.8em; }
            .bdp-table { width: 100%; }
            .bdp-table td { padding: 10px; font-size: 0.9em; }
            #langSwitch {
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1 id="pageTitle">黑页危险交易掉落表</h1>
        <div id="pageSubtitle"></div>
        <div id="langSwitch"></div>
    </header>

    <div class="top-actions">
        <a href="/index.html" class="back-link">← 返回首页</a>
    </div>

    <div id="bdpContainer"></div>
</div>

<a href="#" class="back-to-top">↑</a>

<script src="./data.js"></script>
<script src="/assets/js/i18n/items_i18n.js"></script>
<script src="/assets/js/i18n/lang_switch.js"></script>
<script src="/assets/js/i18n/bdp_view.js"></script>
</body>
</html>
