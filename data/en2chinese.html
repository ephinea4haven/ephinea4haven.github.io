<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="description" content="PSOBB 游戏物品中英文对照表">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>游戏物品中英对照 | Ephinea PSOBB</title>
    <link rel="stylesheet" type="text/css" href="/assets/css/unified-style.css">
    <script src="/assets/js/page-chrome.js"></script>
    <script src="/assets/js/i18n/items_i18n.js"></script>
</head>

<body>
    <page-chrome title="游戏物品中英对照"></page-chrome>

    <div class="content-container">
        <ul id="lookup"></ul>
    </div>

    <script>
        (function () {
            var ul = document.getElementById('lookup');
            var dict = window.ITEMS_I18N || {};
            var rows = [];
            for (var slug in dict) {
                var entry = dict[slug];
                if (entry && entry.en && entry.zh) {
                    rows.push([entry.en, entry.zh]);
                }
            }
            rows.sort(function (a, b) {
                return a[0].toLowerCase().localeCompare(b[0].toLowerCase());
            });
            var frag = document.createDocumentFragment();
            for (var i = 0; i < rows.length; i++) {
                var li = document.createElement('li');
                li.textContent = rows[i][0] + ' ' + rows[i][1];
                frag.appendChild(li);
            }
            ul.appendChild(frag);
        })();
    </script>
</body>

</html>
