<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="description" content="PSOBB 玛古模拟器">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>玛古模拟器 | Ephinea PSOBB</title>
    <link rel="stylesheet" type="text/css" href="/assets/css/unified-style.css">
    <link rel="stylesheet" type="text/css" href="/assets/css/mag-chart.css">
    <script src="/assets/js/page-chrome.js"></script>
    <script src="/assets/js/mag-sim-data.js" defer></script>
    <script src="/assets/js/mag-evolution.js" defer></script>
    <script type="module" src="/assets/js/mag-sim-ui.js"></script>
    <style>
        .mag-sim__grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .mag-sim__setup,
        .mag-sim__card,
        .mag-sim__feed,
        .mag-sim__log {
            min-height: 4rem;
        }

        .mag-sim__controls,
        .mag-sim__log {
            grid-column: 1 / -1;
        }

        .mag-sim__controls {
            min-height: 0;
        }

        @media (max-width: 720px) {
            .mag-sim__grid {
                grid-template-columns: 1fr;
            }
        }

        /* ---------- setup panel ---------- */

        .mag-sim-setup__block {
            margin: 0 0 1.25rem;
            padding: 12px 14px 14px;
            border: 1px solid var(--card-br);
            border-radius: 10px;
        }

        .mag-sim-setup__block legend {
            padding: 0 6px;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .mag-sim-setup__block .mag-tabs {
            margin: 4px 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .mag-sim-setup__row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 14px;
            margin-top: 8px;
        }

        .mag-sim-setup__field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12.5px;
            color: var(--text-secondary);
        }

        .mag-sim-setup__check {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding-bottom: 6px;
            font-size: 12.5px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .mag-sim-setup__check input {
            width: 14px;
            height: 14px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .mag-sim-setup__derived {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .mag-sim-setup__custom {
            margin-top: 10px;
        }

        .mag-sim-setup__stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            margin: 10px 0;
        }

        .mag-sim-setup__stats label {
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .mag-sim-setup__stats input {
            width: 5.5rem;
        }

        .mag-sim-setup__label {
            margin: 10px 0 2px;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .mag-sim-setup__block select,
        .mag-sim-setup__block input[type="number"] {
            padding: 6px 9px;
            font: inherit;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-primary);
            border: 1px solid var(--card-br);
            border-radius: 6px;
        }

        .mag-sim-setup__block select:focus,
        .mag-sim-setup__block input[type="number"]:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .mag-sim-setup__apply {
            padding: 7px 16px;
            font: inherit;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-10);
            border: 1px solid var(--accent-20);
            border-radius: 18px;
            cursor: pointer;
            transition: color .2s ease, background .2s ease, border-color .2s ease;
        }

        .mag-sim-setup__apply:hover {
            color: var(--accent-dark);
            background: var(--accent);
        }

        .mag-idset--picker {
            gap: 8px;
        }

        .mag-id-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px 5px 8px;
            font: inherit;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--accent-5);
            border: 1px solid var(--accent-20);
            border-radius: 16px;
            cursor: pointer;
            transition: color .2s ease, background .2s ease, border-color .2s ease;
        }

        .mag-id-chip img {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .mag-id-chip:hover {
            color: var(--accent);
            background: var(--accent-10);
        }

        .mag-id-chip[aria-selected='true'] {
            color: var(--accent-dark);
            background: var(--accent);
            border-color: var(--accent);
        }

        .mag-id-chip:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* ---------- live Mag card ---------- */

        .mag-sim-card__head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .mag-sim-card__sprite {
            width: 56px;
            height: 56px;
            object-fit: contain;
            image-rendering: pixelated;
            flex: none;
        }

        .mag-sim-card__level {
            margin-top: 2px;
            font-size: 12.5px;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
        }

        .mag-sim-card__stats {
            display: grid;
            gap: 6px;
            margin: 10px 0 12px;
        }

        .mag-sim-card__stat {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr) 64px;
            align-items: center;
            gap: 8px;
        }

        .mag-sim-card__stat-label {
            font-size: 12px;
            font-weight: 700;
        }

        .mag-sim-card__stat-track {
            height: 8px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-br);
            border-radius: 5px;
        }

        .mag-sim-card__stat-fill {
            height: 100%;
            border-radius: 5px;
        }

        .mag-sim-card__stat-fill--pow { background: var(--pow); }
        .mag-sim-card__stat-fill--dex { background: var(--dex); }
        .mag-sim-card__stat-fill--mind { background: var(--mind); }
        .mag-sim-card__stat-fill--def { background: var(--def); }

        .mag-sim-card__stat-value {
            font-size: 11.5px;
            font-variant-numeric: tabular-nums;
            text-align: right;
            color: var(--text-secondary);
        }

        .mag-sim-card__next {
            margin-top: 10px;
            padding-top: 8px;
            font-size: 12.5px;
            color: var(--text-secondary);
            border-top: 1px solid var(--card-br);
        }

        .mag-sim-card__next b {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ---------- feed bar ---------- */

        .mag-sim-feed__list {
            display: grid;
            gap: 6px;
            margin: 10px 0 14px;
        }

        .mag-sim-feed__row {
            display: grid;
            grid-template-columns: auto 4.5rem 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 3px 0;
        }

        .mag-sim-feed__btn {
            padding: 6px 14px;
            font: inherit;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-10);
            border: 1px solid var(--accent-20);
            border-radius: 16px;
            cursor: pointer;
            white-space: nowrap;
            transition: color .2s ease, background .2s ease, border-color .2s ease;
        }

        .mag-sim-feed__btn:hover {
            color: var(--accent-dark);
            background: var(--accent);
        }

        .mag-sim-feed__qty {
            width: 100%;
            padding: 5px 7px;
            font: inherit;
            font-size: 12.5px;
            color: var(--text-primary);
            background: var(--bg-primary);
            border: 1px solid var(--card-br);
            border-radius: 6px;
        }

        .mag-sim-feed__count {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
        }

        .mag-sim-feed__cost {
            min-width: 4.5rem;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            color: var(--text-secondary);
            text-align: right;
        }

        .mag-sim-feed__actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            padding: 10px 0;
            border-top: 1px solid var(--card-br);
            border-bottom: 1px solid var(--card-br);
        }

        .mag-sim-feed__all {
            padding: 7px 18px;
            font: inherit;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--accent-dark);
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            border: none;
            border-radius: 18px;
            cursor: pointer;
        }

        .mag-sim-feed__cells {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .mag-sim-feed__cells select {
            padding: 6px 9px;
            font: inherit;
            font-size: 12.5px;
            color: var(--text-primary);
            background: var(--bg-primary);
            border: 1px solid var(--card-br);
            border-radius: 6px;
        }

        .mag-sim-feed__cell-btn {
            padding: 6px 14px;
            font: inherit;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--mind);
            background: rgba(167, 139, 250, .1);
            border: 1px solid rgba(167, 139, 250, .3);
            border-radius: 16px;
            cursor: pointer;
        }

        .mag-sim-feed__cell-reqs {
            display: grid;
            gap: 4px;
            margin: -4px 0 12px;
        }

        .mag-sim-feed__cell-req {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .mag-sim-feed__cell-req b {
            color: var(--mind);
            font-weight: 600;
        }

        .mag-sim-feed__cell-req--race b {
            color: var(--pow);
        }

        .mag-sim-feed__totals {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 16px;
            font-size: 12.5px;
            color: var(--text-secondary);
        }

        .mag-sim-feed__totals b {
            color: var(--text-primary);
        }

        /* ---------- history log ---------- */

        .mag-sim-log__list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 240px;
            margin-top: 10px;
            padding: 10px 12px;
            overflow-y: auto;
            font-size: 12.5px;
            background: var(--card-bg);
            border: 1px solid var(--card-br);
            border-radius: 10px;
        }

        .mag-sim-log__line {
            padding: 3px 2px;
            color: var(--text-secondary);
        }

        .mag-sim-log__line--ok { color: var(--def); }
        .mag-sim-log__line--reject { color: var(--pow); }

        .mag-sim-log__line--evolve {
            margin: 4px 0;
            padding: 6px 10px;
            font-weight: 700;
            color: var(--text-primary);
            background: var(--accent-15);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
        }

        .mag-sim-log__mark {
            font-weight: 700;
        }

        .mag-sim-log__empty {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* ---------- undo/reset/export controls ---------- */

        .mag-sim-controls__row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .mag-sim-controls__btn {
            padding: 7px 16px;
            font: inherit;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--card-bg);
            border: 1px solid var(--card-br);
            border-radius: 16px;
            cursor: pointer;
            transition: color .2s ease, background .2s ease, border-color .2s ease;
        }

        .mag-sim-controls__btn:hover:not(:disabled) {
            color: var(--accent);
            background: var(--accent-10);
            border-color: var(--accent-20);
        }

        .mag-sim-controls__btn:disabled {
            cursor: not-allowed;
            opacity: .5;
        }

        .mag-sim-controls__btn--accent {
            color: var(--accent-dark);
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            border: none;
        }

        .mag-sim-controls__status {
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <page-chrome title="玛古模拟器"></page-chrome>

    <div class="content-container">

        <p><a href="mag.html">← 进化图谱</a></p>

        <div class="mag-sim__grid">
            <section class="mag-sim__setup" data-sim-setup></section>
            <section class="mag-sim__card" data-sim-card></section>
            <section class="mag-sim__feed" data-sim-feed></section>
            <section class="mag-sim__controls" data-sim-controls></section>
            <section class="mag-sim__log" data-sim-log></section>
        </div>

    </div>

</body>

</html>
